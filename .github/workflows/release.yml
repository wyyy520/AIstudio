name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-binaries:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        os: [linux, windows, darwin]
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build backend binary
        run: |
          cd Backend
          GOOS=${{ matrix.os }} GOARCH=${{ matrix.arch }} go build -o aistudio-server-${{ matrix.os }}-${{ matrix.arch }}${{ matrix.os == 'windows' && '.exe' || '' }} ./cmd/...
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: aistudio-server-${{ matrix.os }}-${{ matrix.arch }}
          path: Backend/aistudio-server-${{ matrix.os }}-${{ matrix.arch }}*

  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          cd Frontend
          npm ci
          npm run build
      - name: Upload frontend build
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: Frontend/dist/

  release-notes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Generate release notes
        run: |
          echo "## AIStudio Release ${{ github.ref_name }}" > release-notes.md
          echo "" >> release-notes.md
          echo "### What's Changed" >> release-notes.md
          git log $(git describe --tags --abbrev=0 2>/dev/null || git rev-list --max-parents=0 HEAD)..HEAD --oneline --pretty=format:"- %s" >> release-notes.md
      - uses: softprops/action-gh-release@v1
        with:
          body_path: release-notes.md
          files: |
            Backend/aistudio-server-*
            Frontend/dist/
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
