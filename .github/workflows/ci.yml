name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Go vet all packages
        run: |
          for pkg in packages/*/; do
            (cd "$pkg" && go vet ./...)
          done
      - name: Go vet backend
        run: |
          cd apps/backend && go vet ./...
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Lint Frontend
        run: |
          cd apps/desktop
          npm ci
          npm run lint --if-present

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Run Go package tests
        run: |
          for pkg in packages/*/; do
            (cd "$pkg" && go test ./... -v -count=1)
          done
      - name: Run backend tests
        run: |
          cd apps/backend && go test ./... -v -count=1
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Run Frontend tests
        run: |
          cd apps/desktop
          npm ci
          npm run test:unit --if-present

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'
      - name: Build backend
        run: |
          cd apps/backend && go build ./cmd/...
      - name: Build packages
        run: |
          for pkg in packages/*/; do
            (cd "$pkg" && go build ./...)
          done
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build frontend
        run: |
          cd apps/desktop
          npm ci
          npm run build --if-present
