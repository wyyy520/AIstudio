version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: deploy/docker/backend.Dockerfile
    container_name: aistudio-backend
    restart: unless-stopped
    ports:
      - "${SERVER_PORT:-8081}:8081"
    environment:
      AISTUDIO_ENV: production
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8081
      DATABASE_TYPE: ${DATABASE_TYPE:-postgres}
      DATABASE_URL: ${DATABASE_URL:-postgresql://aistudio:aistudio@db:5432/aistudio}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRE: ${JWT_EXPIRE:-2h}
      ENGINE_ADDRESS: http://engine:8082
      LLM_PROVIDER: ${LLM_PROVIDER:-}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
    volumes:
      - backend-storage:/app/storage
      - backend-plugins:/app/plugins
      - backend-logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
    networks:
      - aistudio-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8081/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  engine:
    build:
      context: .
      dockerfile: deploy/docker/engine.Dockerfile
    container_name: aistudio-engine
    restart: unless-stopped
    ports:
      - "${ENGINE_PORT:-8082}:8082"
    environment:
      ENGINE_HOST: 0.0.0.0
      ENGINE_PORT: 8082
    volumes:
      - engine-models:/app/models
      - engine-datasets:/app/datasets
    networks:
      - aistudio-net
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8082/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
        limits:
          memory: 8G

  frontend:
    build:
      context: .
      dockerfile: deploy/docker/frontend.Dockerfile
      args:
        VITE_APP_ENV: production
        VITE_API_BASE_URL: ""
        VITE_WS_URL: ""
        VITE_ENGINE_URL: ""
    container_name: aistudio-frontend
    restart: unless-stopped
    networks:
      - aistudio-net

  nginx:
    image: nginx:1.25-alpine
    container_name: aistudio-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      backend:
        condition: service_healthy
      engine:
        condition: service_healthy
      frontend:
        condition: service_started
    networks:
      - aistudio-net

  db:
    image: postgres:16-alpine
    container_name: aistudio-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aistudio}
      POSTGRES_USER: ${POSTGRES_USER:-aistudio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aistudio}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - aistudio-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aistudio}"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aistudio-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - aistudio-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  db-data:
  redis-data:
  backend-storage:
  backend-plugins:
  backend-logs:
  engine-models:
  engine-datasets:
  nginx-logs:

networks:
  aistudio-net:
    driver: bridge